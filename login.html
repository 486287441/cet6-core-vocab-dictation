<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5f4ed" />
  <meta name="color-scheme" content="light" />
  <title>登录 · 六级核心词背诵检测站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css?v=20260529-1" />
</head>
<body class="auth-body">
  <a class="skip-link" href="#auth-main">跳到登录表单</a>
  <div class="page page--auth">
    <main id="auth-main" class="auth-card">
      <p class="site-kicker"><span class="site-kicker__en">CET-6</span> · 云同步</p>
      <h1 id="auth-title" class="auth-card__title">登录</h1>
      <p class="auth-card__lede">登录后学习进度将保存到云端，换设备可续背。</p>

      <div class="auth-tabs" role="tablist" aria-label="登录或注册">
        <button type="button" class="auth-tabs__btn auth-tabs__btn--active" data-auth-mode="login" role="tab" aria-selected="true">登录</button>
        <button type="button" class="auth-tabs__btn" data-auth-mode="register" role="tab" aria-selected="false">注册</button>
      </div>

      <form id="auth-form" class="auth-form" method="post" action="#" autocomplete="on" novalidate>
        <label class="auth-field">
          <span class="auth-field__label">用户名</span>
          <input
            id="auth-username"
            name="username"
            type="text"
            class="auth-field__input"
            autocomplete="username"
            required
            minlength="5"
            maxlength="24"
            pattern="[A-Za-z0-9_]{5,24}"
            placeholder="5–24 位字母、数字、下划线"
          />
        </label>
        <label class="auth-field">
          <span class="auth-field__label">密码</span>
          <input
            id="auth-password"
            name="password"
            type="password"
            class="auth-field__input"
            autocomplete="current-password"
            required
            minlength="8"
            placeholder="至少 8 位"
          />
        </label>
        <p id="auth-message" class="auth-message" hidden role="alert"></p>
        <button id="auth-submit" type="submit" class="btn btn--primary auth-form__submit">登录</button>
      </form>
    </main>
  </div>
  <script src="js/vendor/cloudbase.full.js?v=20260529-3"></script>
  <script>
    document.getElementById("auth-form")?.addEventListener("submit", (e) => e.preventDefault());
  </script>
  <script type="module" src="js/auth/loginPage.js?v=20260529-4"></script>
</body>
</html>
